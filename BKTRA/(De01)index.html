<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="(De01)style.css">
</head>
<body>
    <div class="container">
        <h2 class="main-title">STUDENT MANAGEMENT SYSTEM</h2>
        
        <div class="stats-bar" id="statsBar">
            Tong so sinh vien: 0 | Diem TB lop: 0.00
        </div>

        <button class="btn-open-modal" onclick="showAddModal()">THEM SINH VIEN</button>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>MA SV</th>
                        <th>HO VA TEN</th>
                        <th>NGAY SINH</th>
                        <th>LOP</th>
                        <th>DTB</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 class="modal-title">Them/Sua Sinh Vien</h3>
            <form id="studentForm">
                <input type="hidden" id="editIndex">
                
                <div class="form-group">
                    <label>MA SINH VIEN *</label>
                    <input type="text" id="studentId" placeholder="VD: SV123456">
                    <span class="error" id="errId"></span>
                </div>

                <div class="form-group">
                    <label>HO VA TEN *</label>
                    <input type="text" id="fullName">
                    <span class="error" id="errName"></span>
                </div>

                <div class="form-group">
                    <label>NGAY SINH *</label>
                    <input type="date" id="dob">
                    <span class="error" id="errDob"></span>
                </div>

                <div class="form-group">
                    <label>LOP HOC *</label>
                    <select id="classRoom">
                        <option value="">Chon lop</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                    <span class="error" id="errClass"></span>
                </div>

                <div class="form-group">
                    <label>DIEM TRUNG BINH *</label>
                    <input type="number" step="0.01" id="gpa">
                    <span class="error" id="errGpa"></span>
                </div>

                <div class="form-group">
                    <label>EMAIL SINH VIEN *</label>
                    <input type="text" id="email" placeholder="@student.edu.vn">
                    <span class="error" id="errEmail"></span>
                </div>

                <div class="form-group">
                    <label>MAT KHAU TAI KHOAN *</label>
                    <input type="password" id="password" placeholder="Toi thieu 8 ky tu">
                    <span class="error" id="errPass"></span>
                </div>

                <div class="form-group">
                    <label>XAC NHAN MAT KHAU *</label>
                    <input type="password" id="confirmPass">
                    <span class="error" id="errConfirm"></span>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn-save">LUU SINH VIEN</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">HUY</button>
                </div>
            </form>
        </div>
    </div>

    <script src="(De01)script.js"></script>
</body>
</html>
