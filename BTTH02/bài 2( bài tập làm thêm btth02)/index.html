<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Goals Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Destinations</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <button class="btn">Discover places</button>
            </div>
        </section>

        <section class="highlights">
            <h2>HIGHLIGHTS</h2>
            <div class="container">
                <div class="card">
                    <img src="https://via.placeholder.com/300x150" alt="Miami">
                    <p>MIAMI <span class="cyan">USA</span></p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/300x150" alt="Munich">
                    <p>MUNICH <span class="cyan">GERMANY</span></p>
                </div>
                <div class="card">
                    <img src="https://via.placeholder.com/300x150" alt="Barcelona">
                    <p>BARCELONA <span class="cyan">SPAIN</span></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-facebook"></i>
    </footer>

</body>
</html>
