<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao Diện Form Nằm Ngang</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <div class="form-card">
            <h2 class="form-title">Get in touch with us by filling contact form below</h2>
            
            <form>
                <div class="flex-row">
                    <input type="text" placeholder="* Enter your full name" class="flex-item" required>
                    <input type="email" placeholder="* Enter your email address" class="flex-item" required>
                </div>

                <input type="text" placeholder="Enter your subject" class="full-width">

                <textarea placeholder="* Your message here..." class="full-width" required></textarea>

                <div class="flex-footer">
                    <button type="submit" class="btn-send">Send message</button>
                    <span class="note">* Please fill all required form field, thanks!</span>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
