<!DOCTYPE html>
<html>
<head>
    <title>Bai 1.1 - Bang diem</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        .low { background-color: yellow; }
        .inp-group { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="inp-group">
        <input type="text" id="name" placeholder="Ho ten">
        <input type="number" id="score" placeholder="Diem" step="0.1">
        <button id="add">Them</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Ho ten</th>
                <th>Diem</th>
                <th>Xep loai</th>
                <th>Thao tac</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
    <p id="result"></p>

    <script>
        let data = [];
        const nInp = document.getElementById('name');
        const sInp = document.getElementById('score');

        const getLvl = (s) => {
            if (s >= 8.5) return "Gioi";
            if (s >= 7.0) return "Kha";
            if (s >= 5.0) return "Trung binh";
            return "Yeu";
        };

        const render = () => {
            const body = document.getElementById('list');
            body.innerHTML = "";
            let sum = 0;

            data.forEach((item, i) => {
                const tr = document.createElement('tr');
                if (item.s < 5) tr.className = 'low';
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${item.n}</td>
                    <td>${item.s}</td>
                    <td>${item.l}</td>
                    <td><button onclick="del(${i})">Xoa</button></td>
                `;
                body.appendChild(tr);
                sum += item.s;
            });

            const avg = data.length ? (sum / data.length).toFixed(2) : 0;
            document.getElementById('result').innerText = `Tong: ${data.length} | TB: ${avg}`;
        };

        document.getElementById('add').onclick = () => {
            const n = nInp.value.trim();
            const s = parseFloat(sInp.value);
            if (!n || isNaN(s) || s < 0 || s > 10) {
                alert("Kiem tra lai du lieu");
                return;
            }
            data.push({ n, s, l: getLvl(s) });
            nInp.value = ""; sInp.value = ""; nInp.focus();
            render();
        };

        sInp.onkeyup = (e) => { if (e.key === "Enter") document.getElementById('add').click(); };

        window.del = (i) => {
            data.splice(i, 1);
            render();
        };
    </script>
</body>
</html>
